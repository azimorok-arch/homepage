<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esemka Bima 1.3</title>
    <style>
        /* Reset dasar browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Mengunci layar penuh tanpa scroll */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* Container utama dengan Vignette yang lebih kuat untuk memunculkan efek neon */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Vignette melingkar yang lebih gelap di sudut layar agar cahaya tengah semakin kontras */
        .wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.92) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Landing Page Gambar dengan Efek Zoom-In & Cahaya Tajam */
        .landing-page {
            width: 100%;
            height: 100%;
            background-image: url('b443a968-40d4-4361-aee7-5282ae1946b4.jpeg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: 1;
            
            /* Animasi masuk beralih langsung ke animasi denyut neon yang lebih dramatis */
            animation: cinematicZoomIn 3s cubic-bezier(0.25, 1, 0.5, 1) forwards, 
                      glowIntense 3.5s ease-in-out infinite alternate;
        }

        /* 1. Animasi Masuk: Bergerak maju (Zoom-In) dari skala normal 1 ke 1.06 */
        @keyframes cinematicZoomIn {
            0% {
                opacity: 0;
                transform: scale(1);
                filter: brightness(0.4) contrast(1.1) drop-shadow(0 0 0px rgba(0, 212, 255, 0));
            }
            100% {
                opacity: 1;
                transform: scale(1.06); /* Mengunci di posisi sedikit nge-zoom maju */
                filter: brightness(1.1) contrast(1.25);
            }
        }

        /* 2. Animasi Cahaya Berdenyut: Menaikkan saturasi dan kecerahan lampu secara berkala */
        @keyframes glowIntense {
            0% {
                filter: brightness(1) contrast(1.2) saturate(1.1) cubic-bezier(0.4, 0, 0.2, 1);
            }
            50% {
                /* Efek puncak cahaya: Lampu DRL biru dan latar merah akan terlihat sangat menyala */
                filter: brightness(1.35) contrast(1.4) saturate(1.6) drop-shadow(0 0 15px rgba(0, 162, 255, 0.4));
            }
            100% {
                filter: brightness(1.05) contrast(1.25) saturate(1.2);
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="landing-page"></div>
    </div>

</body>
</html>
