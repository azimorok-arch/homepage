<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esemka Bima 1.3</title>
    <style>
        /* Reset dasar browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Mengunci layar penuh tanpa scroll */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* Container utama dengan efek Vignette (Gelap di sudut layar) */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Membuat sudut layar lebih gelap agar fokus mata tertuju ke lampu mobil di tengah */
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Landing Page Gambar dengan Efek Animasi Sinematik */
        .landing-page {
            width: 100%;
            height: 100%;
            /* Menggunakan file gambar aktif Anda */
            background-image: url('b443a968-40d4-4361-aee7-5282ae1946b4.jpeg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: 1;
            
            /* Memicu animasi saat halaman dimuat */
            animation: cinematicIntro 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards, 
                      neonPulse 4s ease-in-out infinite alternate;
        }

        /* 1. Animasi Masuk: Muncul dari gelap + zoom in tipis yang elegan */
        @keyframes cinematicIntro {
            0% {
                opacity: 0;
                transform: scale(1.08);
                filter: brightness(0.3) contrast(1.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: brightness(1) contrast(1);
            }
        }

        /* 2. Animasi Denyut Cahaya: Membuat aura lampu merah dan biru terasa hidup */
        @keyframes neonPulse {
            0% {
                filter: brightness(0.95) contrast(1);
            }
            100% {
                filter: brightness(1.1) contrast(1.05);
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="landing-page"></div>
    </div>

</body>
</html>
