<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esemka Bima 1.3</title>
    <style>
        /* Menghilangkan margin bawaan browser dan mengunci scroll */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Warna hitam legam sesuai background gambar */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container utama untuk menjaga posisi di tengah */
        .landing-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px; /* Memberi sedikit ruang di layar kecil agar tidak terlalu mepet */
        }

        /* Styling Gambar agar sangat responsif */
        .responsive-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; /* Memastikan seluruh gambar terlihat tanpa terpotong */
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); /* Efek shadow halus */
            user-select: none; /* Mencegah gambar sengaja di-drag */
            -webkit-user-drag: none;
        }

        /* Optimasi tambahan untuk layar HP (Mode Portrait) */
        @media (max-width: 768px) {
            .landing-container {
                padding: 0; /* Full layar tanpa border di HP */
            }
            .responsive-image {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <img src="image_60e2e3.jpg" alt="Esemka Bima 1.3" class="responsive-image">
    </div>

</body>
