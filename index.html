<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esemka Bima 1.3</title>
    <style>
        /* Reset dasar browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Mengunci layar penuh tanpa scroll */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Warna dasar hitam pekat */
        }

        /* Menggunakan background CSS agar posisi gambar otomatis presisi di tengah */
        .landing-page {
            width: 100%;
            height: 100%;
            /* GANTI nama file di bawah ini sesuai dengan nama file gambar Anda yang aktif */
            background-image: url('b443a968-40d4-4361-aee7-5282ae1946b4.jpeg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain; /* Gambar akan menyesuaikan layar PC/HP tanpa terpotong */
        }
    </style>
</head>
<body>

    <div class="landing-page"></div>

</body>
</html>
