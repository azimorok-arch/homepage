<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esemka Bima 1.3</title>
    <style>
        /* Reset dasar browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Mengunci layar penuh tanpa scroll */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* Container utama dengan Vignette yang menonjolkan bagian tengah */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.95) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Landing Page Gambar */
        .landing-page {
            width: 100%;
            height: 100%;
            background-image: url('b443a968-40d4-4361-aee7-5282ae1946b4.jpeg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: 1;
            
            /* Hanya MENGGUNAKAN SATU ANIMASI panjang (5 detik) yang berhenti di akhir (forwards) */
            /* Dibuat sangat halus tanpa ada pengulangan (berkedip) */
            animation: smoothMajesticEntry 5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Animasi Transisi Halus: Muncul -> Zoom In -> Cahaya Terang -> Berhenti */
        @keyframes smoothMajesticEntry {
            0% {
                opacity: 0;
                transform: scale(1); /* Mulai dari posisi agak jauh */
                filter: brightness(0.2) contrast(1) saturate(1); /* Mulai dari gelap */
            }
            100% {
                opacity: 1;
                transform: scale(1.06); /* Berhenti dalam keadaan sudah nge-zoom di depan */
                /* Parameter ini mengunci cahaya lampu agar menyala tajam dan diam */
                filter: brightness(1.2) contrast(1.25) saturate(1.4); 
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="landing-page"></div>
    </div>

</body>
</html>
